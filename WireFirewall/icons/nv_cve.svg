<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFA040"/>
      <stop offset="100%" stop-color="#B03000"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC890"/>
      <stop offset="100%" stop-color="#8A2400"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Small shield/bug under the lens -->
  <path d="M9 13 L9 16 Q9 19 12 20 Q15 19 15 16 L15 13 Z" fill="url(#shield)" stroke="#5A1800" stroke-width="0.4"/>
  <!-- Bug body on shield -->
  <ellipse cx="12" cy="16" rx="1.4" ry="2" fill="#2A0800"/>
  <rect x="11.7" y="14" width="0.6" height="4" fill="#5A1800"/>
  <!-- Magnifying glass lens -->
  <circle cx="10" cy="9" r="5.5" fill="none" stroke="url(#body)" stroke-width="2.2"/>
  <circle cx="10" cy="9" r="4.5" fill="#FFFFFF" fill-opacity="0.25"/>
  <!-- Lens gloss -->
  <ellipse cx="8.5" cy="7" rx="2.2" ry="1.4" fill="url(#gloss)"/>
  <!-- Handle -->
  <rect x="13.5" y="12.5" width="2" height="6" rx="0.8" transform="rotate(-45 14.5 15.5)" fill="url(#body)" stroke="#5A1800" stroke-width="0.4"/>
</svg>
