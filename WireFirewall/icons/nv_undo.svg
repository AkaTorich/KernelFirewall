  </defs>
  <!-- Counter-clockwise curved arrow shaft -->
  <path d="M5 11 Q5 4 12 4 Q19 4 19 11 Q19 16 14 17.5 L14 14.5 Q16 13.5 16 11 Q16 7 12 7 Q8 7 8 11 L8 12 Z"
