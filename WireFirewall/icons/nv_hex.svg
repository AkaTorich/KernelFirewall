<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3CD4FF"/>
      <stop offset="100%" stop-color="#00497A"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Grid background -->
  <rect x="2" y="3" width="20" height="18" rx="1" fill="url(#body)" stroke="#002340" stroke-width="0.5"/>
  <!-- Grid lines -->
  <line x1="9" y1="3" x2="9" y2="21" stroke="#002340" stroke-width="0.4"/>
  <line x1="15" y1="3" x2="15" y2="21" stroke="#002340" stroke-width="0.4"/>
  <line x1="2" y1="9" x2="22" y2="9" stroke="#002340" stroke-width="0.4"/>
  <line x1="2" y1="15" x2="22" y2="15" stroke="#002340" stroke-width="0.4"/>
  <!-- Binary digits -->
  <text x="5.5" y="7.7" font-family="monospace" font-size="3.5" fill="#FFFFFF" font-weight="bold" text-anchor="middle">01</text>
  <text x="12" y="7.7" font-family="monospace" font-size="3.5" fill="#FFFFFF" font-weight="bold" text-anchor="middle">10</text>
  <text x="18.5" y="7.7" font-family="monospace" font-size="3.5" fill="#FFFFFF" font-weight="bold" text-anchor="middle">11</text>
  <text x="5.5" y="13.7" font-family="monospace" font-size="3.5" fill="#FFFFFF" font-weight="bold" text-anchor="middle">10</text>
  <text x="12" y="13.7" font-family="monospace" font-size="3.5" fill="#FFFFFF" font-weight="bold" text-anchor="middle">01</text>
  <text x="18.5" y="13.7" font-family="monospace" font-size="3.5" fill="#FFFFFF" font-weight="bold" text-anchor="middle">00</text>
  <text x="5.5" y="19.7" font-family="monospace" font-size="3.5" fill="#FFFFFF" font-weight="bold" text-anchor="middle">11</text>
  <text x="12" y="19.7" font-family="monospace" font-size="3.5" fill="#FFFFFF" font-weight="bold" text-anchor="middle">00</text>
  <text x="18.5" y="19.7" font-family="monospace" font-size="3.5" fill="#FFFFFF" font-weight="bold" text-anchor="middle">10</text>
  <!-- Gloss -->
  <rect x="2" y="3" width="20" height="7" rx="1" fill="url(#gloss)"/>
</svg>
