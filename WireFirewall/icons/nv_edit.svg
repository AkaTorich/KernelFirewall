<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD43A"/>
      <stop offset="100%" stop-color="#A06400"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Pencil tilted 45 degrees -->
  <g transform="rotate(-45 12 12)">
    <!-- Body -->
    <rect x="3" y="10.5" width="14" height="3" fill="url(#body)" stroke="#4A2E00" stroke-width="0.5"/>
    <!-- Tip (wood) -->
    <path d="M17 10.5 L20 12 L17 13.5 Z" fill="#FFE9A3" stroke="#4A2E00" stroke-width="0.4"/>
    <!-- Graphite -->
    <path d="M19 11.5 L20 12 L19 12.5 Z" fill="#1A1A1A"/>
    <!-- Eraser ferrule -->
    <rect x="1.5" y="10.5" width="1.5" height="3" fill="#888888" stroke="#4A2E00" stroke-width="0.4"/>
    <!-- Eraser -->
    <rect x="0.2" y="10.5" width="1.3" height="3" fill="#FF8AB8" stroke="#4A2E00" stroke-width="0.4"/>
    <!-- Gloss strip on top half of pencil body -->
    <rect x="3" y="10.5" width="14" height="1.2" fill="url(#gloss)"/>
  </g>
</svg>
