<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="msBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
    <linearGradient id="msGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="msSh"><feGaussianBlur stdDeviation="0.3"/></filter>
  </defs>
  <!-- magnifying glass lens -->
  <circle cx="6.5" cy="6.5" r="4.5" fill="#000" opacity="0.35" filter="url(#msSh)" transform="translate(0.2,0.3)"/>
  <circle cx="6.5" cy="6.5" r="4.5" fill="url(#msBase)" stroke="#003A3D" stroke-width="0.7" fill-opacity="0.5"/>
  <!-- memory grid inside lens -->
  <g stroke="#00BCD4" stroke-width="0.3" opacity="0.9">
    <line x1="3" y1="5" x2="10" y2="5"/>
    <line x1="3" y1="7" x2="10" y2="7"/>
    <line x1="3" y1="9" x2="10" y2="9"/>
    <line x1="4.5" y1="3" x2="4.5" y2="10"/>
    <line x1="6.5" y1="3" x2="6.5" y2="10"/>
    <line x1="8.5" y1="3" x2="8.5" y2="10"/>
  </g>
  <!-- highlighted cell -->
  <rect x="6.6" y="5.1" width="1.8" height="1.8" fill="#FFD54F" opacity="0.9"/>
  <!-- lens outer ring -->
  <circle cx="6.5" cy="6.5" r="4.5" fill="none" stroke="#006064" stroke-width="1"/>
  <!-- handle -->
  <line x1="9.8" y1="9.8" x2="14" y2="14" stroke="#000" opacity="0.35" stroke-width="2.2" stroke-linecap="round" filter="url(#msSh)" transform="translate(0.2,0.3)"/>
  <line x1="9.8" y1="9.8" x2="14" y2="14" stroke="#006064" stroke-width="2" stroke-linecap="round"/>
  <line x1="9.8" y1="9.8" x2="13" y2="13" stroke="#80DEEA" stroke-width="0.8" stroke-linecap="round"/>
  <!-- lens gloss -->
  <ellipse cx="5" cy="4.5" rx="2" ry="1" fill="url(#msGloss)"/>
</svg>
