<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <radialGradient id="vhBase" cx="0.5" cy="0.3">
      <stop offset="0%" stop-color="#FFCDD2"/>
      <stop offset="60%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#4A0000"/>
    </radialGradient>
    <linearGradient id="vhGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="vhSh"><feGaussianBlur stdDeviation="0.3"/></filter>
  </defs>
  <!-- crosshair outer -->
  <circle cx="8" cy="8" r="6.2" fill="#000" opacity="0.35" filter="url(#vhSh)" transform="translate(0.2,0.3)"/>
  <circle cx="8" cy="8" r="6.2" fill="url(#vhBase)" stroke="#2A0000" stroke-width="0.5"/>
  <circle cx="8" cy="8" r="4" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.8"/>
  <circle cx="8" cy="8" r="2" fill="none" stroke="#FFFFFF" stroke-width="0.4" opacity="0.7"/>
  <!-- crosshair lines -->
  <line x1="8" y1="1" x2="8" y2="5" stroke="#FFFFFF" stroke-width="0.6"/>
  <line x1="8" y1="11" x2="8" y2="15" stroke="#FFFFFF" stroke-width="0.6"/>
  <line x1="1" y1="8" x2="5" y2="8" stroke="#FFFFFF" stroke-width="0.6"/>
  <line x1="11" y1="8" x2="15" y2="8" stroke="#FFFFFF" stroke-width="0.6"/>
  <!-- center dot (target hit) -->
  <circle cx="8" cy="8" r="0.8" fill="#FFEB3B" stroke="#4A0000" stroke-width="0.3"/>
  <!-- exclamation badge upper-right -->
  <circle cx="12.5" cy="3.5" r="2" fill="#FFEB3B" stroke="#4A0000" stroke-width="0.4"/>
  <rect x="12.2" y="2.3" width="0.6" height="1.6" rx="0.15" fill="#4A0000"/>
  <circle cx="12.5" cy="4.5" r="0.3" fill="#4A0000"/>
  <!-- gloss -->
  <ellipse cx="6" cy="4" rx="3" ry="1.2" fill="url(#vhGloss)"/>
</svg>
