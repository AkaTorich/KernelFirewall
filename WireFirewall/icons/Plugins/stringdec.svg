<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="sdBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="sdGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="sdSh"><feGaussianBlur stdDeviation="0.3"/></filter>
  </defs>
  <!-- lock body -->
  <rect x="2.5" y="6" width="11" height="8" rx="1" fill="#000" opacity="0.35" filter="url(#sdSh)" transform="translate(0.2,0.3)"/>
  <rect x="2.5" y="6" width="11" height="8" rx="1" fill="url(#sdBase)" stroke="#0D3B10" stroke-width="0.5"/>
  <!-- shackle (open — was closed) -->
  <path d="M5 6 V4 Q5 2 8 2 Q11 2 11 4 V6" fill="none" stroke="#555" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M5 6 V4 Q5 2 8 2 Q11 2 11 4 V5" fill="none" stroke="#AAA" stroke-width="0.5" stroke-linecap="round"/>
  <!-- text peeking out -->
  <text x="8" y="11.5" text-anchor="middle" font-family="monospace" font-size="4.5" fill="#FFFFFF" font-weight="bold">ABC</text>
  <!-- gloss -->
  <rect x="2.8" y="6.3" width="10.4" height="2.5" rx="0.4" fill="url(#sdGloss)"/>
</svg>
