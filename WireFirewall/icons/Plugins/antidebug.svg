<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <radialGradient id="adShield" cx="0.5" cy="0.3">
      <stop offset="0%" stop-color="#FF9E9E"/>
      <stop offset="60%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#6A0000"/>
    </radialGradient>
    <linearGradient id="adGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="adSh"><feGaussianBlur stdDeviation="0.3"/></filter>
  </defs>
  <!-- shield shape -->
  <path d="M8 1.3 L13.5 3 V8 Q13.5 12.5 8 14.7 Q2.5 12.5 2.5 8 V3 Z"
        fill="#000" opacity="0.35" filter="url(#adSh)" transform="translate(0.2,0.3)"/>
  <path d="M8 1.3 L13.5 3 V8 Q13.5 12.5 8 14.7 Q2.5 12.5 2.5 8 V3 Z"
        fill="url(#adShield)" stroke="#4A0606" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- bug silhouette -->
  <ellipse cx="8" cy="8.5" rx="2.2" ry="2.8" fill="#1A0000"/>
  <line x1="8" y1="7" x2="8" y2="10" stroke="#FFB0B0" stroke-width="0.3"/>
  <circle cx="7" cy="7" r="0.4" fill="#FFE0E0"/>
  <circle cx="9" cy="7" r="0.4" fill="#FFE0E0"/>
  <!-- slash through bug -->
  <line x1="4" y1="12" x2="12" y2="4" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="4" y1="12" x2="12" y2="4" stroke="#FF1744" stroke-width="0.6" stroke-linecap="round"/>
  <!-- gloss top -->
  <path d="M4 3.3 Q8 2 12 3.3 Q12 5 8 5.5 Q4 5 4 3.3 Z" fill="url(#adGloss)"/>
</svg>
