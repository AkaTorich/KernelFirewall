<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <radialGradient id="body" cx="0.5" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#9CFFC2"/>
      <stop offset="60%" stop-color="#5BFFA5"/>
      <stop offset="100%" stop-color="#00904A"/>
    </radialGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Circle body -->
  <circle cx="12" cy="12" r="10" fill="url(#body)" stroke="#005028" stroke-width="0.6"/>
  <!-- Plus -->
  <rect x="10.7" y="6" width="2.6" height="12" rx="0.5" fill="#FFFFFF"/>
  <rect x="6" y="10.7" width="12" height="2.6" rx="0.5" fill="#FFFFFF"/>
  <!-- Gloss -->
  <ellipse cx="12" cy="7" rx="7.5" ry="3.5" fill="url(#gloss)"/>
