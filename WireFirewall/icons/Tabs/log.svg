<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="lgBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="50%" stop-color="#BDBDBD"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="lgGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="lgSh"><feGaussianBlur stdDeviation="0.3"/></filter>
  </defs>
  <!-- document with folded corner -->
  <path d="M2.5 1.5 H10.5 L13.5 4.5 V14.5 H2.5 Z"
        fill="#000" opacity="0.4" filter="url(#lgSh)" transform="translate(0.3,0.4)"/>
  <path d="M2.5 1.5 H10.5 L13.5 4.5 V14.5 H2.5 Z"
        fill="url(#lgBase)" stroke="#222" stroke-width="0.5" stroke-linejoin="round"/>
  <path d="M10.5 1.5 V4.5 H13.5 Z" fill="#9E9E9E" stroke="#222" stroke-width="0.4"/>
  <!-- log lines colored -->
  <rect x="3.5" y="6" width="6" height="0.7" fill="#81C784"/>
  <rect x="3.5" y="7.3" width="8" height="0.7" fill="#424242"/>
  <rect x="3.5" y="8.6" width="5" height="0.7" fill="#FFB74D"/>
  <rect x="3.5" y="9.9" width="7" height="0.7" fill="#424242"/>
  <rect x="3.5" y="11.2" width="6" height="0.7" fill="#EF5350"/>
  <rect x="3.5" y="12.5" width="4" height="0.7" fill="#424242"/>
  <!-- gloss -->
  <path d="M2.8 1.8 H10.3 V4 Q8 3 2.8 3.8 Z" fill="url(#lgGloss)"/>
</svg>
