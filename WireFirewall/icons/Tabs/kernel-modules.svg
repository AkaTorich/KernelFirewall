<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="kmBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1C4E9"/>
      <stop offset="50%" stop-color="#5E35B1"/>
      <stop offset="100%" stop-color="#1A0A4A"/>
    </linearGradient>
    <radialGradient id="kmCrown" cx="0.5" cy="0.3">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <linearGradient id="kmGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="kmSh"><feGaussianBlur stdDeviation="0.3"/></filter>
  </defs>
  <!-- module body -->
  <rect x="2" y="6" width="12" height="8" rx="0.8" fill="#000" opacity="0.35" filter="url(#kmSh)" transform="translate(0.2,0.3)"/>
  <rect x="2" y="6" width="12" height="8" rx="0.8" fill="url(#kmBase)" stroke="#1A0A4A" stroke-width="0.5"/>
  <text x="8" y="11.5" text-anchor="middle" font-family="monospace" font-size="3.2" font-weight="bold" fill="#FFF">.sys</text>
  <rect x="2.3" y="6.3" width="11.4" height="2" rx="0.4" fill="url(#kmGloss)"/>
  <!-- crown (kernel/ring0 indicator) -->
  <path d="M4 5 L5 2 L6.5 4 L8 1.5 L9.5 4 L11 2 L12 5 Z"
        fill="#000" opacity="0.4" filter="url(#kmSh)" transform="translate(0.2,0.3)"/>
  <path d="M4 5 L5 2 L6.5 4 L8 1.5 L9.5 4 L11 2 L12 5 Z"
        fill="url(#kmCrown)" stroke="#5C3900" stroke-width="0.4" stroke-linejoin="round"/>
  <circle cx="5" cy="2" r="0.5" fill="#FFF"/>
  <circle cx="8" cy="1.5" r="0.5" fill="#FFF"/>
  <circle cx="11" cy="2" r="0.5" fill="#FFF"/>
</svg>
