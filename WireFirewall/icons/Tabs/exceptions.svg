<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="exBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF59D"/>
      <stop offset="50%" stop-color="#F57F17"/>
      <stop offset="100%" stop-color="#5C2E00"/>
    </linearGradient>
    <linearGradient id="exGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="exSh"><feGaussianBlur stdDeviation="0.35"/></filter>
  </defs>
  <!-- triangle warning -->
  <path d="M8 1.5 L15 14 H1 Z"
        fill="#000" opacity="0.4" filter="url(#exSh)" transform="translate(0.3,0.4)"/>
  <path d="M8 1.5 L15 14 H1 Z"
        fill="url(#exBase)" stroke="#3A1A00" stroke-width="0.6" stroke-linejoin="round"/>
  <!-- exclamation -->
  <rect x="7.2" y="5" width="1.6" height="5" rx="0.4" fill="#1A0500"/>
  <circle cx="8" cy="11.8" r="0.9" fill="#1A0500"/>
  <!-- gloss on upper-left edge -->
  <path d="M8 2.3 L3 13.3 H5 L8 4 Z" fill="url(#exGloss)"/>
</svg>
