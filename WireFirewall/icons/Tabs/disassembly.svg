  <rect x="1.5" y="2" width="13" height="12" rx="0.8" fill="#000" opacity="0.35" filter="url(#daSh)" transform="translate(0.2,0.3)"/>
  <rect x="1.5" y="2" width="13" height="12" rx="0.8" fill="url(#daBase)" stroke="#4FC3F7" stroke-width="0.4"/>
