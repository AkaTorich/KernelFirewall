  <rect x="2.5" y="11.8" width="3" height="0.8" fill="#4FC3F7"/>
  <!-- bytes (gray) -->
  <rect x="6" y="3.3" width="2.5" height="0.8" fill="#888"/>
  <rect x="6" y="5" width="2.5" height="0.8" fill="#888"/>
