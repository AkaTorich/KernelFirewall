<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <radialGradient id="bpsBase" cx="0.35" cy="0.3">
      <stop offset="0%" stop-color="#FFB0B0"/>
      <stop offset="60%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#4A0000"/>
    </radialGradient>
    <linearGradient id="bpsGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="bpsSh"><feGaussianBlur stdDeviation="0.3"/></filter>
  </defs>
  <!-- three stacked red dots (list of breakpoints) -->
  <g>
    <circle cx="4" cy="4" r="2.6" fill="#000" opacity="0.4" filter="url(#bpsSh)" transform="translate(0.2,0.3)"/>
    <circle cx="4" cy="4" r="2.6" fill="url(#bpsBase)" stroke="#2A0000" stroke-width="0.4"/>
    <ellipse cx="3.2" cy="3" rx="1.3" ry="0.7" fill="url(#bpsGloss)"/>
  </g>
  <g>
    <circle cx="4" cy="8" r="2.6" fill="#000" opacity="0.4" filter="url(#bpsSh)" transform="translate(0.2,0.3)"/>
    <circle cx="4" cy="8" r="2.6" fill="url(#bpsBase)" stroke="#2A0000" stroke-width="0.4"/>
    <ellipse cx="3.2" cy="7" rx="1.3" ry="0.7" fill="url(#bpsGloss)"/>
  </g>
  <g>
    <circle cx="4" cy="12" r="2.6" fill="#000" opacity="0.4" filter="url(#bpsSh)" transform="translate(0.2,0.3)"/>
    <circle cx="4" cy="12" r="2.6" fill="url(#bpsBase)" stroke="#2A0000" stroke-width="0.4"/>
    <ellipse cx="3.2" cy="11" rx="1.3" ry="0.7" fill="url(#bpsGloss)"/>
  </g>
  <!-- list lines -->
  <rect x="7.5" y="3.3" width="7" height="1" rx="0.2" fill="#888"/>
  <rect x="7.5" y="5" width="5" height="0.6" rx="0.15" fill="#555"/>
  <rect x="7.5" y="7.3" width="7" height="1" rx="0.2" fill="#888"/>
  <rect x="7.5" y="9" width="5" height="0.6" rx="0.15" fill="#555"/>
  <rect x="7.5" y="11.3" width="7" height="1" rx="0.2" fill="#888"/>
  <rect x="7.5" y="13" width="5" height="0.6" rx="0.15" fill="#555"/>
</svg>
