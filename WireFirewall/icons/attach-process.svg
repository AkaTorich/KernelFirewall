<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="apBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D8FF"/>
      <stop offset="50%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0A2E5C"/>
    </linearGradient>
    <linearGradient id="apGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="apPlus" cx="0.5" cy="0.3">
      <stop offset="0%" stop-color="#C8FFB0"/>
      <stop offset="60%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#1B3B1D"/>
    </radialGradient>
    <filter id="apSh"><feGaussianBlur stdDeviation="0.3"/></filter>
  </defs>
  <!-- process box (CPU-ish) -->
  <rect x="1.5" y="4" width="9" height="9" rx="1.2" fill="#000" opacity="0.35" filter="url(#apSh)" transform="translate(0.2,0.3)"/>
  <rect x="1.5" y="4" width="9" height="9" rx="1.2" fill="url(#apBase)" stroke="#061A36" stroke-width="0.5"/>
  <!-- inner "core" grid -->
  <g stroke="#FFFFFF" stroke-width="0.3" opacity="0.6">
    <line x1="3" y1="6.5" x2="9" y2="6.5"/>
    <line x1="3" y1="8.5" x2="9" y2="8.5"/>
    <line x1="3" y1="10.5" x2="9" y2="10.5"/>
    <line x1="4.5" y1="5" x2="4.5" y2="12"/>
    <line x1="6" y1="5" x2="6" y2="12"/>
    <line x1="7.5" y1="5" x2="7.5" y2="12"/>
  </g>
  <!-- gloss -->
  <rect x="1.8" y="4.3" width="8.4" height="3" rx="0.7" fill="url(#apGloss)"/>
  <!-- plus badge top-right -->
  <circle cx="12" cy="4" r="3" fill="#000" opacity="0.35" filter="url(#apSh)" transform="translate(0.2,0.3)"/>
  <circle cx="12" cy="4" r="3" fill="url(#apPlus)" stroke="#0F2A10" stroke-width="0.5"/>
  <rect x="11.5" y="2.5" width="1" height="3" rx="0.2" fill="#FFFFFF"/>
  <rect x="10.5" y="3.5" width="3" height="1" rx="0.2" fill="#FFFFFF"/>
  <ellipse cx="12" cy="3" rx="1.6" ry="0.6" fill="#FFFFFF" opacity="0.5"/>
</svg>
