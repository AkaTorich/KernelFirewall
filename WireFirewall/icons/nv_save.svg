  <rect x="13" y="4" width="2" height="4.5" fill="#1F2A3F"/>
  <!-- Label at bottom -->
  <rect x="5.5" y="13" width="13" height="7" fill="#F4F6FA" stroke="#2A3A55" stroke-width="0.4"/>
  <!-- Label lines -->
  <rect x="7" y="15" width="10" height="0.7" fill="#7088A8"/>
  <rect x="7" y="17" width="10" height="0.7" fill="#7088A8"/>
  <!-- Gloss on top -->
  <path d="M3 3 H18 L21 6 V10 H3 Z" fill="url(#gloss)"/>
