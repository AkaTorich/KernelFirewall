<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE54B"/>
      <stop offset="100%" stop-color="#C18B00"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Warning triangle -->
  <path d="M12 2.5 L22 20.5 H2 Z" fill="url(#body)" stroke="#6B4A00" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Exclamation mark stem -->
  <rect x="10.8" y="8" width="2.4" height="7" rx="0.3" fill="#3A2400"/>
  <!-- Dot -->
  <circle cx="12" cy="17.5" r="1.3" fill="#3A2400"/>
  <!-- Gloss highlight along left edge of triangle -->
  <path d="M12 2.5 L8 11 L2 20.5 L4 20.5 L12 6 Z" fill="url(#gloss)"/>
</svg>
