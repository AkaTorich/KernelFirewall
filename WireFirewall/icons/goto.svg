<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="gotoBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#B5CFE8"/>
      <stop offset="45%" stop-color="#5A7FA8"/>
      <stop offset="100%" stop-color="#24415E"/>
    </linearGradient>
    <linearGradient id="gotoGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="gotoShadow"><feGaussianBlur stdDeviation="0.35"/></filter>
    <clipPath id="gotoClip">
      <path d="M3 6 h4 V3.5 L12.5 8 L7 12.5 V10 H3 Z M13.5 3 h1.5 V13 h-1.5 Z"/>
    </clipPath>
  </defs>
  <path d="M3 6 h4 V3.5 L12.5 8 L7 12.5 V10 H3 Z"
        fill="#000" opacity="0.35" filter="url(#gotoShadow)" transform="translate(0.3,0.4)"/>
  <path d="M3 6 h4 V3.5 L12.5 8 L7 12.5 V10 H3 Z"
        fill="url(#gotoBody)" stroke="#1A2F47" stroke-width="0.55" stroke-linejoin="round"/>
  <g clip-path="url(#gotoClip)"><ellipse cx="7" cy="5" rx="7" ry="2.5" fill="url(#gotoGloss)"/></g>
  <!-- destination line (target) -->
  <rect x="13.5" y="3" width="1.5" height="10" rx="0.3" fill="#E53935" stroke="#4A0606" stroke-width="0.35"/>
  <rect x="13.5" y="3" width="1.5" height="5" rx="0.3" fill="url(#gotoGloss)"/>
</svg>
