<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3CDE9C"/>
      <stop offset="100%" stop-color="#006B3D"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D8E8DE"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pencil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3CDE9C"/>
      <stop offset="100%" stop-color="#006B3D"/>
    </linearGradient>
  </defs>
  <!-- Paper sheet -->
  <path d="M4 3 H16 V21 H4 Z" fill="url(#paper)" stroke="#004A28" stroke-width="0.5"/>
  <!-- Paper lines -->
  <rect x="6" y="7" width="8" height="0.8" fill="#7AA890"/>
  <rect x="6" y="10" width="8" height="0.8" fill="#7AA890"/>
  <rect x="6" y="13" width="8" height="0.8" fill="#7AA890"/>
  <!-- Pencil over paper, tilted -->
  <g transform="rotate(35 16 14)">
    <rect x="12" y="13" width="11" height="2.5" fill="url(#pencil)" stroke="#004A28" stroke-width="0.4"/>
    <!-- Pencil tip -->
    <path d="M23 13 L25 14.25 L23 15.5 Z" fill="#FFD24A" stroke="#5A3D00" stroke-width="0.3"/>
    <path d="M24.3 13.8 L25 14.25 L24.3 14.7 Z" fill="#222"/>
    <!-- Eraser end -->
    <rect x="11" y="13" width="1.2" height="2.5" fill="#FF8AB8" stroke="#004A28" stroke-width="0.3"/>
    <!-- Gloss on pencil -->
    <rect x="12" y="13" width="11" height="0.9" fill="url(#gloss)"/>
  </g>
</svg>
